let currentQ = 0;
let answers = {};

function injectDeviceStyles() {
  const rules = Object.values(devices).map(d => `
    .result-hero[data-device="${d.id}"]::before { background: ${d.color}; }
    .result-icon[data-device="${d.id}"] { background: ${d.colorBg}; }
    .result-label[data-device="${d.id}"] { color: ${d.color}; }
    .score-graph-label[data-device="${d.id}"] { color: ${d.color}; }
    .score-graph-bar-fill[data-device="${d.id}"] { background: ${d.color}; }
    .debug-device-name[data-device="${d.id}"] { color: ${d.colorDark}; }
    .debug-final-bar[data-device="${d.id}"] { background: ${d.colorDark}; }
  `).join('');
  const s = document.createElement('style');
  s.textContent = rules;
  document.head.appendChild(s);
}

function score() {
  const deviceKeys = Object.keys(devices);
  const s = Object.fromEntries(deviceKeys.map(k => [k, 0]));
  for (const q of questions) {
    const answer = answers[q.id];
    if (!answer) continue;
    const opt = q.options.find(o => o.value === answer);
    if (!opt || !opt.signals) continue;
    for (const [dim, strength] of Object.entries(opt.signals)) {
      for (const dk of deviceKeys) {
        s[dk] += strength * (devices[dk].weights[dim] || 0);
      }
    }
  }
  let best = deviceKeys[0];
  for (const dk of deviceKeys) { if (s[dk] > s[best]) best = dk; }
  return { scores: s, best };
}

function render() {
  const q = questions[currentQ];
  const total = questions.length;
  document.getElementById('progress-label').textContent = `Question ${currentQ + 1} of ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentQ) / total) * 100}%`;

  const selected = answers[q.id] || null;

  let html = `<div class="question-card" key="${q.id}">
    <div class="question-number">Q${currentQ + 1}</div>
    <div class="question-text">${q.text}</div>
    <div class="question-hint">${q.hint}</div>
    <div class="options">`;

  q.options.forEach(opt => {
    const sel = selected === opt.value ? ' selected' : '';
    html += `<div class="option${sel}" onclick="selectOption('${q.id}','${opt.value}')">
      <div class="option-radio"></div>
      <div><div class="option-label">${opt.label}</div>${opt.desc ? `<div class="option-desc">${opt.desc}</div>` : ''}</div>
    </div>`;
  });

  html += `</div>
    <div class="nav">
      <button class="btn btn-secondary" onclick="prev()" ${currentQ === 0 ? 'style="visibility:hidden"' : ''}>← Back</button>
      <button class="btn btn-primary" id="next-btn" onclick="next()" ${!selected ? 'disabled' : ''}>${currentQ === total - 1 ? 'See my result' : 'Continue →'}</button>
    </div>
  </div>`;

  document.getElementById('question-container').innerHTML = html;
  if (CONFIG.debug) renderDebug();
}

function renderDebug() {
  const panel = document.getElementById('debug-panel');
  panel.classList.remove('hidden');

  const s = score().scores;
  const best = Object.entries(s).sort((a, b) => b[1] - a[1])[0][0];

  const answeredQs = questions.filter(q => answers[q.id]);
  const answerSummary = answeredQs.map(q => {
    const opt = q.options.find(o => o.value === answers[q.id]);
    return `<span>${q.id}</span>: ${opt ? opt.label : answers[q.id]}`;
  }).join(' · ');

  panel.innerHTML = `
    <div class="debug-title">⚙ Debug - live scoring (${answeredQs.length}/${questions.length} answered)</div>
    <div class="debug-scores">
      ${Object.entries(s).map(([k, v]) => `
        <div class="debug-device${k === best && v > 0 ? ' leading' : ''}">
          <div class="debug-device-name" data-device="${k}">${devices[k].shortName}</div>
          <div class="debug-device-score">${Math.round(v * 10) / 10}</div>
        </div>
      `).join('')}
    </div>
    ${answerSummary ? `<div class="debug-answers">${answerSummary}</div>` : ''}
  `;
}

function selectOption(qid, val) {
  answers[qid] = val;
  render();
}

function prev() {
  if (currentQ > 0) { currentQ--; render(); }
}

function next() {
  if (!answers[questions[currentQ].id]) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    render();
  } else {
    showResult();
  }
}

          <div style="margin-top:8px;font-size:14px;font-weight:600;color:var(--text-secondary)">${priceStr}${d.shopUrl ? ` · <a href="${d.shopUrl}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-weight:600">Shop ↗</a>` : ''}</div>
        </div>
        <div class="result-body">

                <div><div class="pro-con-label pros">Pros</div><ul class="pro-con-list">${prosHtml}</ul></div>
                <div><div class="pro-con-label cons">Cons</div><ul class="pro-con-list">${consHtml}</ul></div>

function buildScoreGraph(scores, best) {
  const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
  const maxS = Math.max(...Object.values(scores), 1);
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topScore = sorted[0][1];
  const runnerScore = sorted[1][1];
  const isClose = topScore > 0 && runnerScore > 0 && (topScore - runnerScore) <= 3;

  return `
    <div class="score-graph">
      <div class="score-graph-title">How you matched</div>
      ${sorted.map(([k, v]) => {
        const positiveTotal = Object.values(scores).filter(x => x > 0).reduce((a, b) => a + b, 0) || 1;
        const pct = v > 0 ? Math.round((v / positiveTotal) * 100) : 0;
        const barW = Math.max(0, maxS > 0 ? (v / maxS) * 100 : 0);
        return `<div class="score-graph-row">
          <div class="score-graph-label" data-device="${k}">${devices[k].shortName}</div>
          <div class="score-graph-bar-track">
            <div class="score-graph-bar-fill" data-device="${k}" style="width:${barW}%"></div>
          </div>
          <div class="score-graph-pct">${pct}%</div>
        </div>`;
      }).join('')}
      ${isClose ? `<div class="score-graph-hint">Your top two results were close - you may want to compare both options with your manager or IT before deciding.</div>` : ''}
    </div>`;
}

function buildDebugFinal(scores, best) {
  const maxS = Math.max(...Object.values(scores), 1);
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);

  const answerSummary = questions.map(q => {
    const opt = q.options.find(o => o.value === answers[q.id]);
    return `<span style="color:#e7e5e4">${q.id}</span>: ${opt ? opt.label : '-'}`;
  }).join('<br>');

  return `
    <div class="debug-final">
      <div class="debug-title">⚙ Debug - final scores</div>
      ${sorted.map(([k, v]) => `
        <div class="debug-final-row">
          <div class="debug-final-label" data-device="${k}">${devices[k].shortName}</div>
          <div class="debug-final-bar-bg">
            <div class="debug-final-bar" data-device="${k}" style="width:${Math.max(0, (v / maxS) * 100)}%"></div>
          </div>
          <div class="debug-final-val">${Math.round(v * 10) / 10}</div>
        </div>
      `).join('')}
      <div class="debug-final-winner">
        Winner: <strong>${devices[best].name}</strong> (score ${Math.round(scores[best] * 10) / 10})
        · Runner-up: ${devices[sorted[1][0]].name} (${Math.round(sorted[1][1] * 10) / 10})
        · Gap: ${Math.round((scores[best] - sorted[1][1]) * 10) / 10} pts
      </div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06);font-size:10px;color:#a8a29e;line-height:1.8">
        ${answerSummary}
      </div>
    </div>`;
}

function buildUpgradeOptions(deviceKey) {
  const d = devices[deviceKey];
  if (!d.upgradeOptions) return '';

  const sectionLabels = { cpu: 'CPU / Chip', ram: 'Memory (RAM)', storage: 'Storage' };

  const sectionsHtml = Object.entries(d.upgradeOptions).map(([key, options]) => `
    <div>
      <div class="upgrade-category-label">${sectionLabels[key]}</div>
      <div class="upgrade-options">
        ${options.map((opt, i) => `
          <div class="upgrade-option${i === 0 ? ' base' : ''}">
            <div class="upgrade-option-label">${opt.label}</div>
            ${opt.note ? `<div class="upgrade-option-note">${opt.note}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  return `
    <div class="upgrade-section">
      <div class="result-section-title">Configuration options</div>
      <div class="upgrade-grid">${sectionsHtml}</div>
      ${d.upgradeNote ? `<div class="upgrade-overlap-note">${d.upgradeNote}</div>` : ''}
    </div>
  `;
}

function restart() {
  currentQ = 0;
  answers = {};
  document.querySelector('.page').classList.remove('wide');
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('result-section').innerHTML = '';
  document.getElementById('quiz-section').classList.remove('hidden');
  if (CONFIG.debug) document.getElementById('debug-panel').classList.remove('hidden');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

injectDeviceStyles();
(function applyConfig() {
  document.title = CONFIG.title;
  const logo = document.querySelector('.site-logo');
  if (logo) { logo.src = CONFIG.logoUrl; logo.alt = CONFIG.logoAlt; }
  const header = document.querySelector('.site-header');
  if (header) header.style.background = CONFIG.bannerGradient;
  const h1 = document.querySelector('.site-header-text h1');
  if (h1) h1.textContent = CONFIG.title;
  const sub = document.querySelector('.site-header-text p');
  if (sub) sub.textContent = CONFIG.subtitle;
})();
render();
</script>
</body>
</html>
